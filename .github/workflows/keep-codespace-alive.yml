name: Keep Codespace Alive

on:
  schedule:
    # Every 20 minutes — resets the idle timer before GitHub's 30-min cutoff
    - cron: "*/20 * * * *"
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Find active Codespace and restart if shutdown
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_TOKEN }}
        run: |
          CODESPACE=$(gh api /user/codespaces \
            --jq '.codespaces[]
                  | select(.repository.full_name == "${{ github.repository }}")
                  | .name' \
            | head -1)

          if [ -z "$CODESPACE" ]; then
            echo "No codespace found — nothing to do."
            exit 0
          fi

          STATE=$(gh api /user/codespaces/$CODESPACE --jq '.state')
          echo "Codespace: $CODESPACE  State: $STATE"

          if [ "$STATE" = "Shutdown" ]; then
            echo "Restarting codespace..."
            gh api -X POST /user/codespaces/$CODESPACE/start
            sleep 30
          fi

      - name: Ping dashboard to reset idle timer
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_TOKEN }}
        run: |
          CODESPACE=$(gh api /user/codespaces \
            --jq '.codespaces[]
                  | select(.repository.full_name == "${{ github.repository }}")
                  | .name' \
            | head -1)

          # Build the forwarded port URL for port 7890 (dashboard)
          # Codespace port URLs follow the pattern:
          # https://{codespace-name}-{port}.app.github.dev
          DASHBOARD_URL="https://${CODESPACE}-7890.app.github.dev/api/pharmacies"

          echo "Pinging: $DASHBOARD_URL"
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -H "X-Github-Token: $GH_TOKEN" \
            "$DASHBOARD_URL" || echo "Ping failed (port may be private — see README)"
